<!DOCTYPE html>
<html lang="en">
	<head>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@100..900&display=optional"
			rel="preload"
			as="style"
		/>
		<meta charset="UTF-8" />
		<link
			rel="icon"
			href="%sveltekit.assets%/favicon.svg"
			type="image/svg+xml"
		/>
		<link
			rel="icon"
			href="%sveltekit.assets%/favicon.svg"
			type="image/svg+xml"
			media="(prefers-color-scheme: dark)"
		/>
		<link
			rel="shortcut icon"
			href="%sveltekit.assets%/favicon.ico"
			sizes="32x32"
		/>
		<link
			rel="shortcut icon"
			href="%sveltekit.assets%/favicon-dark.ico"
			sizes="32x32"
			media="(prefers-color-scheme: dark)"
		/>
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="%sveltekit.assets%/favicon.png"
		/>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
		<meta name="robots" content="index, follow" />
		<meta property="og:title" content="Glottica" />
		<meta property="og:site_name" content="Glottica" />
		<meta property="og:url" content="https://glottica.org" />
		<title>Glottica</title>
		<meta
			name="description"
			content="Learning platform and tools for Indo-Europeanists."
		/>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link
			href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@100..900&display=optional"
			rel="stylesheet"
		/>
		<noscript>
			<style>
				.theme-toggle {
					display: none;
				}
			</style>
		</noscript>
		<script>
			if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
				document.documentElement.dataset.theme = 'dark';
			} else {
				document.documentElement.dataset.theme = 'light';
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">
			%sveltekit.body%
		</div>
	</body>
</html>
